<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.T. — Red de Sensores</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f172a; color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 100%; max-width: 700px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }
        .header p { color: #94a3b8; font-size: 0.85rem; margin-top: 5px; }

        .card {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 12px; padding: 24px; margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #e2e8f0; border-bottom: 1px solid #334155; padding-bottom: 10px; }

        /* Formulario de Registro */
        .form-group { display: flex; gap: 10px; }
        .form-group input {
            flex: 1; padding: 12px; border-radius: 8px;
            background: #0f172a; border: 1px solid #475569;
            color: white; font-size: 0.95rem; outline: none;
        }
        .form-group input:focus { border-color: #38bdf8; }
        
        .btn {
            padding: 12px 20px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; transition: 0.2s;
            color: white;
        }
        .btn-primary { background: #0284c7; }
        .btn-primary:hover { background: #0369a1; }
        
        /* Lista de Sensores */
        .sensor-list { display: grid; gap: 12px; margin-top: 15px; }
        .sensor-item {
            background: #0f172a; padding: 16px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #64748b;
        }
        .sensor-item.normal { border-left-color: #10b981; }
        .sensor-item.alerta { border-left-color: #ef4444; }
        
        .sensor-info h3 { font-size: 1rem; color: #f1f5f9; }
        .sensor-info p { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
        
        .sensor-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }
        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }
        .btn-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-success:hover { background: rgba(16, 185, 129, 0.3); }

        .badge {
            padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 10px;
            text-transform: uppercase;
        }
        .badge.normal { background: #10b981; color: white; }
        .badge.alerta { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>S.A.T. — Red de Sensores</h1>
        <p>Controlador de Alerta Temprana - Grupo 2</p>
    </div>

    <div class="card">
        <h2>Registrar Nuevo Sensor</h2>
        <div class="form-group">
            <input type="text" id="sensor-name" placeholder="Ej: Sensor Humo - Piso 3">
            <button class="btn btn-primary" id="btn-register">Registrar</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 16px;">
            <h2 style="border: none; margin: 0; padding: 0;">Sensores Activos</h2>
            <button class="btn btn-primary btn-sm" id="btn-refresh">Refrescar</button>
        </div>
        
        <div class="sensor-list" id="sensor-container">
            <p style="text-align: center; color: #64748b;">Cargando sensores...</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
